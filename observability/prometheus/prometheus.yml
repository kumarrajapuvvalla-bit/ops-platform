# Prometheus configuration for local docker-compose stack
# Scrapes the Fleet Health Exporter every 15 seconds

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: local
    cluster: ops-platform-local

rule_files:
  - /etc/prometheus/alerts/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: fleet-exporter
    static_configs:
      - targets:
          - fleet-exporter:8000
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
