# Alertmanager configuration for local docker-compose stack
# Routes all alerts to a log receiver (no real notifications locally)

global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'environment']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: local-log

receivers:
  - name: local-log
    # Null receiver for local dev — alerts are visible in Alertmanager UI
    # Replace with your Slack/PagerDuty config for real environments

inhibit_rules:
  - source_matchers:
      - severity = critical
    target_matchers:
      - severity = warning
    equal:
      - alertname
