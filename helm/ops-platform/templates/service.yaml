apiVersion: v1
kind: Service
metadata:
  name: {{ include "ops-platform.fullname" . }}-exporter
  labels:
    {{- include "ops-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: fleet-exporter
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: {{ .Values.fleetExporter.service.port | quote }}
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.fleetExporter.service.port }}
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    {{- include "ops-platform.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: fleet-exporter
