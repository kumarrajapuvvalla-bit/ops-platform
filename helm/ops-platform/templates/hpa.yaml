{{- if .Values.fleetExporter.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "ops-platform.fullname" . }}-exporter
  labels:
    {{- include "ops-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: fleet-exporter
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "ops-platform.fullname" . }}-exporter
  minReplicas: {{ .Values.fleetExporter.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.fleetExporter.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.fleetExporter.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
