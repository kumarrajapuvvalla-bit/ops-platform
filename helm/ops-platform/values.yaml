# Default values for ops-platform Helm chart

global:
  environment: dev
  imageRegistry: ghcr.io/kumarrajapuvvalla-bit

nameOverride: ""
fullnameOverride: ""

# ── Fleet Health Exporter ──────────────────────────────────────────────────────
fleetExporter:
  enabled: true
  replicaCount: 1
  image:
    repository: fleet-exporter
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8000
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  env:
    SCRAPE_INTERVAL: "30"
    METRICS_PORT: "8000"
  serviceAccount:
    create: true
    name: ""
    annotations:
      eks.amazonaws.com/role-arn: ""  # Set via values override for IRSA
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: [ALL]
  # HPA configuration (spec requirement)
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

# ── Self-Healing Operator ────────────────────────────────────────────────────
selfHealingOperator:
  enabled: true
  replicaCount: 1
  image:
    repository: ops-operator
    tag: latest
    pullPolicy: IfNotPresent
  leaderElection: true
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 128Mi
  serviceAccount:
    create: true
    annotations: {}

# ── Prometheus ServiceMonitor ─────────────────────────────────────────────────
prometheus:
  serviceMonitor:
    enabled: true
    interval: 30s
    path: /metrics
