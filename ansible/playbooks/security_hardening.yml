---
# security_hardening.yml — CIS Level 1 Security Hardening
#
# Applies CIS Benchmark Level 1 hardening to EKS worker nodes.
# Covers SSH, sysctl, auditd, fail2ban, and kernel parameters.

- name: Apply CIS Level 1 security hardening
  hosts: eks_nodes
  become: true

  tasks:
    - name: Disable root SSH login
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^PermitRootLogin'
        line: 'PermitRootLogin no'
      notify: restart sshd

    - name: Disable SSH password authentication
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^PasswordAuthentication'
        line: 'PasswordAuthentication no'
      notify: restart sshd

    - name: Set SSH idle timeout
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^ClientAliveInterval'
        line: 'ClientAliveInterval 300'
      notify: restart sshd

    - name: Apply CIS sysctl hardening
      ansible.posix.sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        state: present
        reload: true
      loop:
        - { name: 'net.ipv4.ip_forward', value: '0' }
        - { name: 'net.ipv4.conf.all.send_redirects', value: '0' }
        - { name: 'net.ipv4.conf.all.accept_source_route', value: '0' }
        - { name: 'net.ipv4.conf.all.log_martians', value: '1' }
        - { name: 'kernel.randomize_va_space', value: '2' }

    - name: Install and configure auditd
      ansible.builtin.yum:
        name: audit
        state: present

    - name: Start and enable auditd
      ansible.builtin.systemd:
        name: auditd
        enabled: true
        state: started

    - name: Install fail2ban
      ansible.builtin.yum:
        name: fail2ban
        state: present

    - name: Configure fail2ban for SSH
      ansible.builtin.copy:
        dest: /etc/fail2ban/jail.local
        content: |
          [sshd]
          enabled = true
          port = ssh
          maxretry = 3
          bantime = 3600
        mode: '0644'
      notify: restart fail2ban

    - name: Enable and start fail2ban
      ansible.builtin.systemd:
        name: fail2ban
        enabled: true
        state: started

  handlers:
    - name: restart sshd
      ansible.builtin.systemd:
        name: sshd
        state: restarted
    - name: restart fail2ban
      ansible.builtin.systemd:
        name: fail2ban
        state: restarted
