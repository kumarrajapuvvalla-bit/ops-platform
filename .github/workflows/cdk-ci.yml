name: CDK CI

on:
  pull_request:
    paths:
      - 'infrastructure/**'
  push:
    branches:
      - main

jobs:
  cdk-synth:
    name: CDK Synth
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infrastructure
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Set up Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install AWS CDK CLI
        run: npm install -g aws-cdk

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: CDK Synth (validates all stacks without deploying)
        run: |
          cdk synth \
            --context environment=dev \
            --context account=123456789012 \
            --context region=eu-west-2 \
            --require-approval never \
            --quiet
        env:
          # CDK_DEFAULT_ACCOUNT and CDK_DEFAULT_REGION are needed for synth
          CDK_DEFAULT_ACCOUNT: '123456789012'
          CDK_DEFAULT_REGION: 'eu-west-2'
          AWS_DEFAULT_REGION: 'eu-west-2'

      - name: Confirm synth succeeded
        run: echo "CDK synth passed — all stacks are valid CloudFormation"
