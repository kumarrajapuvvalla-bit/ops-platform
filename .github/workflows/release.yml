name: Release

# Triggers on version tags: v1.0.0, v1.2.3-rc1, etc.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

env:
  REGISTRY: ghcr.io
  EXPORTER_IMAGE: ghcr.io/kumarrajapuvvalla-bit/fleet-exporter
  OPERATOR_IMAGE: ghcr.io/kumarrajapuvvalla-bit/ops-operator

jobs:
  validate:
    name: Pre-release Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run exporter tests
        run: |
          pip install -r exporter/requirements.txt
          pytest exporter/tests/ -v

      - name: Run operator build
        working-directory: operator
        run: |
          go vet ./...
          CGO_ENABLED=0 go build -o /dev/null .

      - name: Helm lint
        uses: azure/setup-helm@v5
        with:
          version: 'v3.14.0'
      - run: helm lint helm/ops-platform/

  build-and-push:
    name: Build & Push Container Images
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build and push Fleet Exporter
        uses: docker/build-push-action@v5
        with:
          context: ./exporter
          push: true
          tags: |
            ${{ env.EXPORTER_IMAGE }}:${{ github.ref_name }}
            ${{ env.EXPORTER_IMAGE }}:${{ steps.version.outputs.VERSION }}
            ${{ env.EXPORTER_IMAGE }}:latest
          labels: |
            org.opencontainers.image.title=fleet-exporter
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Operator
        uses: docker/build-push-action@v5
        with:
          context: ./operator
          push: true
          tags: |
            ${{ env.OPERATOR_IMAGE }}:${{ github.ref_name }}
            ${{ env.OPERATOR_IMAGE }}:${{ steps.version.outputs.VERSION }}
            ${{ env.OPERATOR_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION=${GITHUB_REF_NAME}
          NOTES=$(awk "/## \[${VERSION#v}\]/,/## \[/" CHANGELOG.md | head -n -1 | tail -n +2)
          echo "NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.NOTES }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}
          generate_release_notes: false

  notify-release:
    name: Notify Release
    runs-on: ubuntu-latest
    needs: create-github-release
    if: always()
    steps:
      - name: Post release summary
        run: |
          echo "Release ${{ github.ref_name }} published successfully"
          echo "Exporter: ${{ env.EXPORTER_IMAGE }}:${{ github.ref_name }}"
          echo "Operator: ${{ env.OPERATOR_IMAGE }}:${{ github.ref_name }}"
