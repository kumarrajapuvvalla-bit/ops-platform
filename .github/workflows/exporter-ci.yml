name: Python Exporter CI

on:
  pull_request:
    paths: ['exporter/**']
  push:
    branches: [main]
    paths: ['exporter/**']

jobs:
  test:
    name: pytest + lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -r exporter/requirements.txt
      - run: pytest exporter/tests/ -v --tb=short
        working-directory: .
      - run: pip install ruff && ruff check exporter/ --select E,F,W --ignore E501
      - name: Bandit security scan
        uses: PyCQA/bandit-action@v1
        with:
          targets: exporter/
          level: medium
          confidence: medium
