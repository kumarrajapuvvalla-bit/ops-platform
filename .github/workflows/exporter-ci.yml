name: Python Exporter CI

on:
  pull_request:
    paths:
      - 'exporter/**'
  push:
    branches:
      - main

jobs:
  test:
    name: pytest + lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install test dependencies
        run: pip install -r exporter/ci-requirements.txt

      - name: Run pytest
        working-directory: exporter
        run: pytest tests/ -v --tb=short

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check exporter/ --select E,F,W --ignore E501

      - name: Security scan with bandit
        run: |
          pip install bandit
          bandit -r exporter/ -ll -ii --exclude exporter/tests
