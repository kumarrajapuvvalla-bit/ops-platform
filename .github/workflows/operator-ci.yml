name: Go Operator CI

on:
  pull_request:
    paths: ['operator/**']
  push:
    branches: [main]
    paths: ['operator/**']

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  build-test:
    name: Build, Vet & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: operator
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: operator/go.sum
      - run: go mod download
      - run: go vet ./...
      - run: go build ./...
      - name: staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: '2024.1'
          working-directory: operator
  security:
    name: gosec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: securego/gosec@master
        with:
          args: ./operator/...
