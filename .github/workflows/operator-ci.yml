name: Go Operator CI

on:
  pull_request:
    paths:
      - 'operator/**'
  push:
    branches:
      - main

jobs:
  build-test:
    name: Build & Vet
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: operator
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go 1.22
        uses: actions/setup-go@v6
        with:
          go-version: '1.22'
          # No cache-dependency-path — go.sum is generated by go mod tidy

      - name: Generate go.sum with go mod tidy
        run: go mod tidy

      - name: go vet
        run: go vet ./...

      - name: Build binary
        run: CGO_ENABLED=0 go build -o /dev/null ./...

      - name: Confirm binary compiles cleanly
        run: echo "Build successful — operator compiles without errors"
